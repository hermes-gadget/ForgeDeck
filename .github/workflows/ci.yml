name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Clean environment checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Clean install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test source with coverage
        run: npm run test:coverage

      - name: Production build
        run: npm run build

      - name: Install accessibility test browser
        run: npx playwright install --with-deps chromium

      - name: Keyboard, viewport, axe, and theme contrast checks
        run: npm run test:a11y

      - name: Check unused exports and dependencies
        run: npm run quality

      - name: Audit dependencies
        run: npm run audit
